name: Sign – Hello World Demo

# Demonstrates building a .NET application and signing it with Azure Trusted Signing.
# Requires the Azure Trusted Signing infrastructure to be deployed first
# (see the "Deploy – Azure Trusted Signing" workflow).
#
# Required GitHub Actions variables (Settings → Secrets and variables → Variables):
#   AZURE_CLIENT_ID             – App Registration client ID
#   AZURE_TENANT_ID             – Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID       – Target subscription ID
#   AZURE_TRUSTED_SIGNING_ENDPOINT    – Signing endpoint, e.g. https://eastus.codesigning.azure.net
#   AZURE_TRUSTED_SIGNING_ACCOUNT     – Trusted Signing account name
#   AZURE_TRUSTED_SIGNING_CERT_PROFILE – Certificate profile name
#
# OIDC federated credential must be configured for this repository / environment.
# See README.md § "OIDC Setup" for instructions.

on:
  workflow_dispatch:
    inputs:
      endpoint:
        description: 'Trusted Signing endpoint (e.g. https://eastus.codesigning.azure.net)'
        required: false
        default: ''
        type: string
      signing_account_name:
        description: 'Trusted Signing account name'
        required: false
        default: ''
        type: string
      certificate_profile_name:
        description: 'Certificate profile name'
        required: false
        default: ''
        type: string

permissions:
  # Required for OIDC token exchange with Azure
  id-token: write
  contents: read

jobs:
  build-and-sign:
    name: Build and sign Hello World
    runs-on: windows-latest   # artifact-signing-action requires a Windows runner

    environment: azure

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout repository
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Set up .NET SDK
      # ------------------------------------------------------------------
      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      # ------------------------------------------------------------------
      # 3. Restore dependencies
      # ------------------------------------------------------------------
      - name: Restore dependencies
        run: dotnet restore src/HelloWorld/HelloWorld.csproj

      # ------------------------------------------------------------------
      # 4. Build and publish (self-contained Windows x64 executable)
      # ------------------------------------------------------------------
      - name: Build and publish
        run: |
          dotnet publish src/HelloWorld/HelloWorld.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output "${{ github.workspace }}\publish"

      # ------------------------------------------------------------------
      # 5. Azure login via OIDC (no long-lived secrets required)
      # ------------------------------------------------------------------
      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}

      # ------------------------------------------------------------------
      # 6. Sign the published executable with Azure Artifact Signing
      #
      # Endpoint / account / profile are resolved in priority order:
      #   1. Workflow dispatch input (if provided)
      #   2. Repository variable (AZURE_TRUSTED_SIGNING_*)
      # ------------------------------------------------------------------
      - name: Sign files with Artifact Signing
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ inputs.endpoint || vars.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ inputs.signing_account_name || vars.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ inputs.certificate_profile_name || vars.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}\publish
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          # Use AzureCliCredential (set up by azure/login above) for OIDC auth.
          # All other credential types are disabled to avoid accidental fallback.
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      # ------------------------------------------------------------------
      # 7. Upload signed artifact
      # ------------------------------------------------------------------
      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: hello-world-signed
          path: ${{ github.workspace }}\publish\HelloWorld.exe
          if-no-files-found: error

      # ------------------------------------------------------------------
      # 8. Write job summary
      # ------------------------------------------------------------------
      - name: Write job summary
        if: always()
        shell: pwsh
        run: |
          @"
          ## 🔐 Azure Artifact Signing – Hello World Demo

          | Property | Value |
          |---|---|
          | Signing endpoint | ``${{ inputs.endpoint || vars.AZURE_TRUSTED_SIGNING_ENDPOINT }}`` |
          | Account name     | ``${{ inputs.signing_account_name || vars.AZURE_TRUSTED_SIGNING_ACCOUNT }}`` |
          | Certificate profile | ``${{ inputs.certificate_profile_name || vars.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}`` |
          | Signed file      | ``HelloWorld.exe`` |

          ### Next steps
          - Download the **hello-world-signed** artifact from the run summary.
          - Verify the signature: ``Get-AuthenticodeSignature .\HelloWorld.exe``
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
